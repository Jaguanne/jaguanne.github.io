<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FreshEyes — Independent Software Testing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
    --bg: #1A2A2F;
    --bg-elevated: #0D1B1E;
    --bg-card: #325055;
    --text: #F3F5F7;
    --text-dim: rgba(243, 245, 247, 0.7);
    --text-muted: rgba(243, 245, 247, 0.4);
    --lime: #BEF812;
    --lime-dim: rgba(190, 248, 18, 0.08);
    --lime-glow: rgba(190, 248, 18, 0.15);
    --border: rgba(255, 255, 255, 0.06);
    --font-display: 'Inter', sans-serif;
    --font-body: 'Inter', sans-serif;
    --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
    font-family: var(--font-body);
    background: var(--bg);
    color: var(--text);
    line-height: 1.7;
    font-size: 15px;
    overflow-x: hidden;
}

::selection { background: var(--lime); color: var(--bg); }

a { color: var(--lime); text-decoration: none; }

/* ── Nav ── */
.nav {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    padding: 20px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(26, 42, 47, 0.8);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    transition: all 0.3s var(--ease);
}

.nav-brand {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.5px;
}

.nav-brand span { color: var(--lime); }

.nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
}

.nav-links a {
    font-size: 13px;
    font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0.5px;
    transition: color 0.3s;
}

.nav-links a:hover, .nav-links a.active { color: var(--lime); }

.nav-cta {
    padding: 10px 24px;
    background: var(--lime);
    color: var(--bg);
    font-weight: 600;
    font-size: 13px;
    border-radius: 6px;
    transition: all 0.3s var(--ease);
}

.nav-cta:hover {
    box-shadow: 0 0 24px rgba(190, 248, 18, 0.3);
    transform: translateY(-1px);
    color: var(--bg);
}

.lang-switch {
    font-size: 12px;
    color: var(--text-muted);
    margin-left: 16px;
    padding-left: 16px;
    border-left: 1px solid var(--border);
}

.lang-switch a { color: var(--text-muted); font-size: 12px; }
.lang-switch a:hover { color: var(--lime); }

/* ── Hero ── */
.hero {
    position: relative;
    min-height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
}

.hero-image {
    position: absolute;
    inset: 0;
    background: url('/my-eyes-lime-black-3.jpg') center center/contain no-repeat;
    background-color: var(--bg);
}

.hero-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background:
        linear-gradient(to right, var(--bg) 0%, rgba(26,42,47,0.4) 35%, transparent 60%),
        linear-gradient(to top, var(--bg) 0%, transparent 25%);
}

.hero-content {
    position: relative;
    z-index: 2;
    padding: 0 48px;
    max-width: 680px;
}

.hero-eyebrow {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--lime);
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease) 0.2s forwards;
}

.hero h1 {
    font-family: var(--font-display);
    font-size: clamp(42px, 6vw, 72px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -2px;
    margin-bottom: 24px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease) 0.4s forwards;
}

.hero h1 em {
    font-style: italic;
    color: var(--lime);
    font-weight: 400;
}

.hero-sub {
    font-size: 18px;
    color: var(--text-dim);
    max-width: 500px;
    line-height: 1.7;
    margin-bottom: 40px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease) 0.6s forwards;
}

.hero-actions {
    display: flex;
    gap: 16px;
    opacity: 0;
    animation: fadeUp 0.8s var(--ease) 0.8s forwards;
}

.btn-lime {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    background: var(--lime);
    color: var(--bg);
    font-weight: 600;
    font-size: 14px;
    border-radius: 8px;
    transition: all 0.3s var(--ease);
}

.btn-lime:hover {
    box-shadow: 0 0 32px rgba(190, 248, 18, 0.35);
    transform: translateY(-2px);
    color: var(--bg);
}

.btn-ghost {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 14px 32px;
    border: 1px solid var(--border);
    color: var(--text);
    font-weight: 500;
    font-size: 14px;
    border-radius: 8px;
    transition: all 0.3s var(--ease);
}

.btn-ghost:hover {
    border-color: var(--lime);
    color: var(--lime);
}

/* rest unchanged */
</style>
</head>
<body>
<!-- content unchanged -->
</body>
</html>
